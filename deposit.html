<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar Fondos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="menu.html">
                <i class="bi bi-wallet2 fs-3 text-primary"></i><span class="fw-bold">Alke Wallet</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="menu.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="deposit.html">Depositar</a></li>
                    <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar dinero</a></li>
                    <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
                </ul>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span id="user-name">Cris Leal</span></button>
                    <ul class="dropdown-menu dropdown-menu-end"><li><a class="dropdown-item text-danger" href="#" onclick="logout()">Cerrar sesión</a></li></ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <h1 class="section-title"><i class="bi bi-plus-circle-fill text-success me-2"></i> Depositar Fondos</h1>
                <p class="text-muted">Agrega dinero a tu billetera de forma rápida y segura.</p>

                <div class="card mb-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div><p class="text-muted mb-1 small">Saldo actual</p><h3 class="mb-0 fw-bold" id="current-balance">$0</h3></div>
                        <i class="bi bi-wallet2 fs-1 text-primary opacity-25"></i>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h5 class="mb-0">Detalles del depósito</h5></div>
                    <div class="card-body">
                        <form id="depositForm">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Monto a depositar</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="amount" placeholder="0" min="1" step="0.01" required>
                                    <span class="input-group-text">CLP</span>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Método</label>
                                <select class="form-select" id="method">
                                    <option value="bank">Transferencia bancaria</option>
                                    <option value="card">Tarjeta de débito/crédito</option>
                                    <option value="cash">Depósito en efectivo</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-check-circle me-2"></i> Realizar Depósito</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        protectPage();
        $(document).ready(function() {
            $('#user-name').text(getCurrentUser());
            updateBalanceDisplay('current-balance');

            $('#depositForm').on('submit', function(e) {
                e.preventDefault();
                const amount = parseFloat($('#amount').val());
                if (!amount || amount <= 0) { showNotification('Monto inválido', 'warning'); return; }

                const current = getBalance();
                setBalance(current + amount);
                addTransaction({ type: 'deposit', amount: amount, description: 'Depósito de fondos', fromTo: 'Transferencia bancaria' });

                showNotification(`¡Depósito de ${formatCurrency(amount)} realizado con éxito!`, 'success');
                updateBalanceDisplay('current-balance');
                setTimeout(() => { if(confirm('¿Volver al menú?')) window.location.href='menu.html'; }, 1200);
            });
        });
    </script>
</body>
</html>
