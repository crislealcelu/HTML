<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="menu.html"><i class="bi bi-wallet2 fs-3 text-primary"></i><span class="fw-bold">Alke Wallet</span></a>
            <div class="collapse navbar-collapse"><ul class="navbar-nav"><li><a class="nav-link" href="menu.html">Inicio</a></li><li><a class="nav-link active" href="sendmoney.html">Enviar dinero</a></li></ul></div>
            <div class="dropdown"><button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown"><span id="user-name">Cris Leal</span></button><ul class="dropdown-menu"><li><a class="dropdown-item text-danger" onclick="logout()" href="#">Cerrar sesión</a></li></ul></div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-5">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between"><h5>Mis Contactos</h5>
                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addContactModal">+ Agregar</button>
                    </div>
                    <div class="card-body">
                        <input type="text" class="form-control mb-3" id="contact-search" placeholder="Buscar contacto...">
                        <div id="contacts-list" style="max-height:380px; overflow:auto;"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header"><h5>Realizar Transferencia</h5></div>
                    <div class="card-body">
                        <div id="selected-contact-display" class="alert alert-light d-none mb-3"></div>
                        <form id="sendForm">
                            <input type="hidden" id="recipient-name">
                            <div class="mb-3"><label class="form-label">Destinatario</label><div class="form-control bg-light" id="recipient-display">Selecciona un contacto →</div></div>
                            <div class="row">
                                <div class="col-6"><label class="form-label">Monto</label><input type="number" class="form-control" id="send-amount" required></div>
                                <div class="col-6"><label class="form-label">Nota (opcional)</label><input type="text" class="form-control" id="send-note"></div>
                            </div>
                            <div class="alert alert-info mt-3">Saldo disponible: <strong id="send-current-balance">$0</strong></div>
                            <button type="submit" class="btn btn-primary w-100" id="send-btn" disabled>Enviar Dinero</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Agregar Contacto -->
    <div class="modal fade" id="addContactModal"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5>Agregar nuevo contacto</h5></div>
        <form id="addContactForm"><div class="modal-body">
            <input type="text" class="form-control mb-2" id="new-contact-name" placeholder="Nombre" required>
            <input type="text" class="form-control" id="new-contact-account" placeholder="Email o cuenta" required>
        </div>
        <div class="modal-footer"><button class="btn btn-primary" type="submit">Guardar</button></div></form>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        protectPage();
        let selectedContact = null;

        $(document).ready(function() {
            $('#user-name').text(getCurrentUser());
            updateBalanceDisplay('send-current-balance');
            loadContacts();

            $('#contact-search').on('keyup', function(){ loadContacts($(this).val()); });

            $('#sendForm').on('submit', function(e){
                e.preventDefault();
                if(!selectedContact) return showNotification('Selecciona un contacto', 'warning');
                const amount = parseFloat($('#send-amount').val());
                if(amount > getBalance()) return showNotification('Saldo insuficiente', 'danger');

                setBalance(getBalance() - amount);
                addTransaction({type:'sent', amount:amount, description: $('#send-note').val() || 'Transferencia', fromTo: selectedContact.name });
                showNotification('¡Transferencia enviada!', 'success');
                updateBalanceDisplay('send-current-balance');
                clearSelectedContact();
            });

            $('#addContactForm').on('submit', function(e){
                e.preventDefault();
                const name = $('#new-contact-name').val().trim();
                const account = $('#new-contact-account').val().trim();
                const newC = addContact({name, account});
                bootstrap.Modal.getInstance(document.getElementById('addContactModal')).hide();
                loadContacts();
                setTimeout(() => selectContact(newC.id), 300);
            });
        });

        function loadContacts(search='') {
            const container = $('#contacts-list'); container.empty();
            let contacts = getContacts();
            if(search) contacts = contacts.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
            contacts.forEach(c => {
                const initials = c.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
                container.append(`<div class="contact-item" data-id="${c.id}"><div class="contact-avatar">${initials}</div><div><strong>${c.name}</strong><br><small>${c.account}</small></div></div>`);
            });
            $('.contact-item').on('click', function(){ selectContact(parseInt($(this).data('id'))); });
        }

        function selectContact(id) {
            selectedContact = getContacts().find(c => c.id === id);
            $('#recipient-display').html(`<strong>${selectedContact.name}</strong> <small>(${selectedContact.account})</small>`);
            $('#recipient-name').val(selectedContact.name);
            $('#selected-contact-display').removeClass('d-none').html(`<strong>${selectedContact.name}</strong>`);
            $('#send-amount').focus();
            $('#send-btn').prop('disabled', false);
        }

        function clearSelectedContact() {
            selectedContact = null;
            $('#recipient-display').text('Selecciona un contacto →');
            $('#selected-contact-display').addClass('d-none');
            $('#send-btn').prop('disabled', true);
            loadContacts();
        }
    </script>
</body>
</html>
