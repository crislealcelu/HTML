<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="card login-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
                    <i class="bi bi-wallet2 fs-1 text-primary"></i>
                    <span class="login-logo">Alke Wallet</span>
                </div>
                <p class="text-muted mb-0">Tu billetera digital segura</p>
            </div>

            <h2 class="text-center fw-bold mb-4">Iniciar Sesión</h2>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="email" placeholder="clealp" value="clealp" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" value="Leal12345!" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                        <label class="form-check-label" for="rememberMe">Recordarme</label>
                    </div>
                    <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                </button>
            </form>

            <div class="alert alert-light border mt-3 small">
                <strong class="text-primary"><i class="bi bi-info-circle me-1"></i> Credenciales de prueba:</strong><br>
                <strong>Usuario:</strong> clealp<br>
                <strong>Contraseña:</strong> Leal12345!
            </div>

            <div class="text-center mt-3">
                <p class="text-muted small mb-0">¿No tienes cuenta? 
                    <a href="#" class="text-primary fw-semibold" data-bs-toggle="modal" data-bs-target="#registerModal">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Crear nueva cuenta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">Esta es una simulación del registro.</p>
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" value="Cris Leal" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" value="clealp" disabled>
                    </div>
                    <div class="alert alert-success small">
                        <i class="bi bi-check-circle me-1"></i> ¡Cuenta creada exitosamente! (Simulado)
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="simulateRegisterLogin()">Usar esta cuenta e iniciar sesión</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        $('#togglePassword').on('click', function() {
            const passwordInput = $('#password');
            const icon = $(this).find('i');
            
            if (passwordInput.attr('type') === 'password') {
                passwordInput.attr('type', 'text');
                icon.removeClass('bi-eye').addClass('bi-eye-slash');
            } else {
                passwordInput.attr('type', 'password');
                icon.removeClass('bi-eye-slash').addClass('bi-eye');
            }
        });

        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            const email = $('#email').val().trim();
            const password = $('#password').val();

            if (email === 'clealp' && password === 'Leal12345!') {
                localStorage.setItem('alke_loggedIn', 'true');
                localStorage.setItem('alke_userName', 'Cris Leal');
                localStorage.setItem('alke_userEmail', email);
                
                const btn = $(this).find('button[type="submit"]');
                btn.html('<span class="spinner-border spinner-border-sm me-2"></span> Ingresando...');
                btn.prop('disabled', true);
                
                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 800);
            } else {
                showNotification('Credenciales incorrectas. Usa clealp / Leal12345!', 'danger');
                $('.login-card').addClass('animate__animated animate__shakeX');
                setTimeout(() => {
                    $('.login-card').removeClass('animate__animated animate__shakeX');
                }, 600);
            }
        });

        function simulateRegisterLogin() {
            localStorage.setItem('alke_loggedIn', 'true');
            localStorage.setItem('alke_userName', 'Cris Leal');
            localStorage.setItem('alke_userEmail', 'clealp');
            window.location.href = 'menu.html';
        }

        $(document).ready(function() {
            $('#email').focus().select();
        });
    </script>
</body>
</html>
